name: Agentic AI Assistant CI/CD

"on":
  push:
    branches:
      - main
    paths-ignore:
      - README.md

  workflow_dispatch:

concurrency:
  group: agentic-ai-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  # ============================================================
  # 1. CONTINUOUS INTEGRATION
  # ============================================================
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        run: |
          test -f Dockerfile

      - name: Validate Requirements
        run: |
          test -f requirements.txt

      - name: Basic CI Checks
        run: |
          echo "Repository validation completed."

  # ============================================================
  # 2. BUILD & PUSH DOCKER IMAGE
  # ============================================================
  push_to_registry:
    name: Build and Push Docker Image
    needs: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker Buildx Setup
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 3. DEPLOY TO EC2 SELF-HOSTED RUNNER
  # ============================================================
  deploy:
    name: Deploy to AWS EC2
    needs: push_to_registry
    runs-on: self-hosted

    steps:

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Image
        run: |
          docker pull \
          ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest

      - name: Stop Existing Container
        run: |
          docker rm -f agentic-ai 2>/dev/null || true

      - name: Create Persistent Directories
        run: |
          mkdir -p /home/ubuntu/agentic-data
          mkdir -p /home/ubuntu/uploads
          mkdir -p /home/ubuntu/hf_cache

      - name: Run Container
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

        run: |
          docker run -d \
            --restart unless-stopped \
            --name agentic-ai \
            -p 8501:8501 \
            -v /home/ubuntu/agentic-data:/app/data \
            -v /home/ubuntu/uploads:/app/uploads \
            -v /home/ubuntu/hf_cache:/app/hf_cache \
            -e GROQ_API_KEY \
            -e TAVILY_API_KEY \
            -e OPENWEATHER_API_KEY \
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest

      - name: Verify Container Running
        run: |
          sleep 10

          if ! docker ps \
            --filter "name=^agentic-ai$" \
            --filter "status=running" \
            --format "{{.Names}}" \
            | grep -q "^agentic-ai$"; then

            echo "Container failed to start"

            docker logs agentic-ai || true

            exit 1
          fi

      - name: Streamlit Health Check
        run: |
          for i in $(seq 1 12)
          do
            if docker exec agentic-ai \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"
            then
              echo "Application Healthy"
              exit 0
            fi

            echo "Waiting for application startup..."
            sleep 5
          done

          docker logs --tail 100 agentic-ai

          exit 1

      - name: Show Recent Logs
        if: always()
        run: |
          docker logs --tail 50 agentic-ai || true

      - name: Cleanup Docker
        if: always()
        run: |
          docker container prune -f
          docker image prune -f